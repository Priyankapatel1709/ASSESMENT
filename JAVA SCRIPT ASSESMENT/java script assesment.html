<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="slideshow-container">
    <div class="mySlides fade">
      <div class="numbertext">1 / 4</div>
      <img
        src="https://images.pexels.com/photos/1168940/pexels-photo-1168940.jpeg?cs=srgb&dl=pexels-zhang-kaiyv-1168940.jpg&fm=jpg"
        style="width:100%">
      <div class="text">Caption 1</div>
    </div>

    <div class="mySlides fade">
      <div class="numbertext">2 / 4</div>
      <img
        src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2l0eXxlbnwwfHwwfHx8MA%3D%3D&w=1000&q=80"
        style="width:100%">
      <div class="text">Caption 2</div>
    </div>

    <div class="mySlides fade">
      <div class="numbertext">3 / 4</div>
      <img
        src="https://images.pexels.com/photos/599982/pexels-photo-599982.jpeg?cs=srgb&dl=pexels-kostiantyn-stupak-599982.jpg&fm=jpg"
        style="width:100%">
      <div class="text">Caption 3</div>
    </div>
    <div class="mySlides fade">
      <div class="numbertext">4 / 4</div>
      <img src="https://cdn.pixabay.com/photo/2014/11/21/17/23/new-york-540807_1280.jpg" style="width:100%">
      <div class="text">Caption 4</div>
    </div>
    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>

  </div>
  <br>

  <div style="text-align:center">
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
    <span class="dot" onclick="currentSlide(4)"></span>
  </div>
</body>

</html>
<script src="script.js"></script>
